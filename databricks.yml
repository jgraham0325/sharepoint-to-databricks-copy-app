bundle:
  name: sharepoint-upload-app

sync:
  exclude:
    - "*.bin"

targets:
  dev:
    mode: development
    default: true
    workspace:
      profile: ps

resources:
  jobs:
    sharepoint-transfer:
      name: sharepoint-transfer
      description: "Transfer large files from SharePoint to UC volumes (offloaded from app server)"
      environments:
        - environment_key: default
          spec:
            client: "1"
            dependencies:
              - requests
      tasks:
        - task_key: transfer
          environment_key: default
          spark_python_task:
            python_file: ./notebooks/sharepoint_transfer.py
            parameters: []

  apps:
    sharepoint-upload-app:
      name: sharepoint-upload-app
      description: "Browse SharePoint and copy files to a Databricks Unity Catalog Volume"
      source_code_path: ./back-end
      config:
        command:
          - uvicorn
          - app:app
          - --host
          - 0.0.0.0
          - --port
          - "8000"
        env:
          - name: MS_CLIENT_ID
            value_from: ${MS_CLIENT_ID_SECRET}
          - name: MS_CLIENT_SECRET
            value_from: ${MS_CLIENT_SECRET_SECRET}
          - name: MS_TENANT_ID
            value_from: ${MS_TENANT_ID_SECRET}
