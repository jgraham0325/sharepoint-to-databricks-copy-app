bundle:
  name: sharepoint-upload-app

sync:
  exclude:
    - "*.bin"

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: https://adb-3737170459724564.4.azuredatabricks.net

resources:
  jobs:
    sharepoint-transfer:
      name: sharepoint-transfer
      description: "Transfer large files from SharePoint to UC volumes (offloaded from app server)"
      max_concurrent_runs: 1
      # Includes time in queue (Queued/Pending) + execution. Set high so batches aren't killed while waiting.
      timeout_seconds: 10800
      parameters:
        - name: manifest_paths_json
          default: ""
        - name: scope
          default: ""
        - name: tokens_key
          default: ""
      environments:
        - environment_key: default
          spec:
            environment_version: "4"
            dependencies:
              - requests
              - msal
      tasks:
        - task_key: prepare_inputs
          environment_key: default
          spark_python_task:
            python_file: ./notebooks/prepare_manifest_inputs.py
            parameters:
              - "{{job.parameters.manifest_paths_json}}"
        - task_key: for_each_transfer
          depends_on:
            - task_key: prepare_inputs
          for_each_task:
            inputs: "{{tasks.prepare_inputs.values.manifest_paths}}"
            concurrency: 10
            task:
              task_key: transfer
              environment_key: default
              spark_python_task:
                python_file: ./notebooks/sharepoint_transfer.py
                parameters:
                  - "{{job.parameters.scope}}"
                  - "{{job.parameters.tokens_key}}"
                  - "{{input}}"

  apps:
    sharepoint-to-databricks-transfer:
      name: sharepoint-databricks-transfer
      description: "Transfer files from SharePoint to Databricks Unity Catalog Volumes"
      source_code_path: ./back-end
      config:
        command:
          - uvicorn
          - app:app
          - --host
          - 0.0.0.0
          - --port
          - "8000"
        env:
          - name: MS_CLIENT_ID
            value_from: ${MS_CLIENT_ID_SECRET}
          - name: MS_CLIENT_SECRET
            value_from: ${MS_CLIENT_SECRET_SECRET}
          - name: MS_TENANT_ID
            value_from: ${MS_TENANT_ID_SECRET}
