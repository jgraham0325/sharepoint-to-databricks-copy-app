bundle:
  name: sharepoint-upload-app

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: ${DATABRICKS_HOST}

resources:
  apps:
    sharepoint-upload-app:
      name: sharepoint-upload-app
      description: "Browse SharePoint and copy files to a Databricks Unity Catalog Volume"
      source_code_path: ./back-end
      config:
        command:
          - uvicorn
          - app:app
          - --host
          - 0.0.0.0
          - --port
          - "8000"
        env:
          - name: MS_CLIENT_ID
            value_from: ${MS_CLIENT_ID_SECRET}
          - name: MS_CLIENT_SECRET
            value_from: ${MS_CLIENT_SECRET_SECRET}
          - name: MS_TENANT_ID
            value_from: ${MS_TENANT_ID_SECRET}
